<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse — Modern Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════ AUTH SCREEN ═══ -->
  <div id="auth">
    <div class="auth-wrap">

      <div class="auth-brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 0C5.373 0 0 5.373 0 12c0 2.127.555 4.127 1.528 5.862L0 24l6.324-1.524A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/>
          </svg>
        </div>
        <div class="brand-name">Pulse<span>.</span></div>
        <div class="brand-sub">Encrypted · Fast · Beautiful</div>
      </div>

      <div class="auth-card">
        <div class="tab-group">
          <button class="tab active" onclick="switchTab('login')">Sign In</button>
          <button class="tab" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="lf">
          <div class="field">
            <label>Email</label>
            <input id="le" type="text" placeholder="you@example.com" value="ali@demo.com" />
          </div>
          <div class="field">
            <label>Password</label>
            <input id="lp" type="password" placeholder="••••••••" value="demo123" />
          </div>
          <button class="auth-btn" onclick="doLogin()">Continue →</button>
          <div class="auth-hint">demo: ali@demo.com / demo123</div>
        </div>

        <!-- Signup Form -->
        <div id="sf" style="display:none">
          <div class="field">
            <label>Full Name</label>
            <input id="sn" placeholder="Your name" />
          </div>
          <div class="field">
            <label>Email</label>
            <input id="se" type="email" placeholder="you@example.com" />
          </div>
          <div class="field">
            <label>Password</label>
            <input id="sp" type="password" placeholder="Min 6 characters" />
          </div>
          <button class="auth-btn" onclick="doSignup()">Create Account →</button>
        </div>
      </div>

    </div>
  </div>
  <!-- ════════════════════════════════════════════════════════ -->


  <!-- ═══════════════════════════════════════ MAIN APP ═══════ -->
  <div id="app">

    <!-- ── SIDEBAR ── -->
    <div class="sidebar" id="sidebar">

      <div class="sb-header">
        <div class="me-avatar" id="myAvi"></div>
        <div class="me-info">
          <div class="me-name" id="myName">Ali Hassan</div>
          <div class="me-status">
            <div class="pulse-dot"></div>online
          </div>
        </div>
        <div class="sb-actions">
          <button class="ico" title="New chat" onclick="openModal()">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </button>
          <button class="ico" title="Logout" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          </button>
        </div>
      </div>

      <div class="search-wrap">
        <div class="search-inner">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input placeholder="Search conversations..." oninput="filterChats(this.value)" />
        </div>
      </div>

      <div class="section-label">Messages</div>
      <div class="chat-list" id="chatList"></div>

    </div>
    <!-- ── /SIDEBAR ── -->


    <!-- ── MAIN AREA ── -->
    <div class="main">
      <div class="chat-bg"></div>

      <!-- Empty State -->
      <div class="empty" id="emptyState">
        <div class="empty-orb">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <h2>Welcome to Pulse</h2>
        <p>Select a conversation to start messaging, or start a new chat.</p>
        <div class="lock-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" stroke="var(--text3)" fill="none" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <span>End-to-end encrypted</span>
        </div>
      </div>

      <!-- Active Chat -->
      <div id="activeChat">

        <div class="chat-header">
          <button class="ico" id="back-btn" onclick="goBack()">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <div class="hdr-avi" id="hdrAvi"></div>
          <div class="hdr-info">
            <div class="hdr-name" id="hdrName"></div>
            <div class="hdr-status" id="hdrStatus"></div>
          </div>
          <div class="sb-actions">
            <button class="ico">
              <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .92h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            </button>
            <button class="ico">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
            </button>
          </div>
        </div>

        <div class="messages" id="msgs"></div>

        <div class="input-bar">
          <button class="ico">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
          </button>
          <div class="input-box">
            <input id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()" />
            <button class="ico attach-ico">
              <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
          </div>
          <button class="send" onclick="send()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>

      </div>
      <!-- /Active Chat -->

    </div>
    <!-- ── /MAIN AREA ── -->

  </div>
  <!-- ════════════════════════════════════════════════════════ -->


  <!-- ═══════════════════════════════════════ NEW CHAT MODAL ═ -->
  <div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3>New Conversation</h3>
          <p>Choose someone to message</p>
        </div>
        <button class="ico" onclick="closeModal()">
          <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
  <!-- ════════════════════════════════════════════════════════ -->


  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
